name: Main Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build App APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK) 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew || true

      - name: Build Android App with Gradle
        run: |
          # Robust check and regeneration of the gradle wrapper to heal any binary corruption from git checkout
          gradle wrapper --gradle-version 9.3.1
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HappVpn-Debug-Apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
